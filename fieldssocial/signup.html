<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fields social.</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,300&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gray:   #ABABAB;
      --white:  #FFFFFF;
      --dim:    rgba(255,255,255,0.5);
      --dimmer: rgba(255,255,255,0.25);
      --border: rgba(255,255,255,0.2);
      --error:  rgba(255,255,255,0.7);
    }

    html, body {
      min-height: 100%;
      background: var(--gray);
      color: var(--white);
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: none;
    }

    /* ── Cursor ── */
    .cursor {
      position: fixed;
      width: 7px; height: 7px;
      background: var(--white);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.12s ease;
    }

    .cursor-ring {
      position: fixed;
      width: 28px; height: 28px;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: opacity 0.3s ease;
    }

    /* ── Page ── */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px 48px;
    }

    /* ── Top ── */
    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.1s forwards;
    }

    .top-logo {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--white);
      text-decoration: none;
    }

    .top-right {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: var(--dim);
    }

    /* ── Center ── */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 0 40px;
      max-width: 360px;
    }

    .page-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
    }

    .page-title {
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-weight: 800;
      line-height: 1.0;
      letter-spacing: -0.03em;
      color: var(--white);
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.3s forwards;
    }

    /* ── Form ── */
    .form {
      display: flex;
      flex-direction: column;
      gap: 0;
      width: 100%;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.45s forwards;
    }

    .name-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
    }

    .field-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .field-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      outline: none;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--white);
      padding: 10px 0;
      letter-spacing: 0.02em;
      transition: border-color 0.25s ease;
      width: 100%;
    }

    .field-input::placeholder { color: var(--dimmer); }
    .field-input:focus { border-color: rgba(255,255,255,0.6); }
    .field-input.error { border-color: var(--white); }

    .field-hint {
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--dimmer);
      margin-top: 6px;
    }

    .field-error {
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--white);
      margin-top: 6px;
      display: none;
    }

    .field-error.show { display: block; }

    /* ── Submit ── */
    .btn-submit {
      width: 100%;
      padding: 14px 24px;
      background: var(--white);
      border: none;
      color: var(--gray);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: none;
      margin-top: 8px;
      transition: opacity 0.25s ease;
    }

    .btn-submit:hover { opacity: 0.85; }
    .btn-submit:disabled { opacity: 0.4; }

    .form-footer {
      margin-top: 24px;
      font-size: 0.72rem;
      font-weight: 300;
      color: var(--dim);
      letter-spacing: 0.02em;
    }

    .form-footer a {
      color: var(--white);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1px;
      transition: border-color 0.25s ease;
    }

    .form-footer a:hover { border-color: var(--white); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      padding: 12px 24px;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--white);
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Bottom ── */
    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.9s forwards;
    }

    .bottom-tagline {
      font-size: 0.72rem;
      font-weight: 300;
      font-style: italic;
      color: var(--dim);
      letter-spacing: 0.02em;
    }

    .bottom-right {
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dimmer);
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .page { padding: 28px; }
      .name-row { grid-template-columns: 1fr; gap: 0; }
      .center { max-width: 100%; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>
  <div class="toast" id="toast"></div>

  <div class="page">

    <!-- Top -->
    <div class="top">
      <a href="app_index.html" class="top-logo">fields social.</a>
      <span class="top-right">august 2026.</span>
    </div>

    <!-- Center -->
    <div class="center">
      <p class="page-label">Create account</p>
      <h1 class="page-title">join<br/>fields.</h1>

      <div class="form">

        <!-- Name row -->
        <div class="name-row">
          <div class="field">
            <label class="field-label" for="firstName">First name</label>
            <input class="field-input" id="firstName" type="text" placeholder="haileigh" autocomplete="given-name" />
            <span class="field-error" id="firstNameError">required.</span>
          </div>
          <div class="field">
            <label class="field-label" for="lastName">Last name</label>
            <input class="field-input" id="lastName" type="text" placeholder="fields" autocomplete="family-name" />
            <span class="field-error" id="lastNameError">required.</span>
          </div>
        </div>

        <!-- Email -->
        <div class="field">
          <label class="field-label" for="email">Email</label>
          <input class="field-input" id="email" type="email" placeholder="you@umich.edu" autocomplete="email" />
          <span class="field-hint">@umich.edu emails only.</span>
          <span class="field-error" id="emailError">@umich.edu email required.</span>
        </div>

        <!-- Password -->
        <div class="field">
          <label class="field-label" for="password">Password</label>
          <input class="field-input" id="password" type="password" placeholder="minimum 8 characters" autocomplete="new-password" />
          <span class="field-error" id="passwordError">minimum 8 characters.</span>
        </div>

        <!-- Submit -->
        <button class="btn-submit" id="submitBtn" onclick="handleSignup()">
          Create account →
        </button>

        <p class="form-footer">
          already have an account? <a href="login.html">log in.</a>
        </p>

      </div>
    </div>

    <!-- Bottom -->
    <div class="bottom">
      <p class="bottom-tagline">you'll want to be here.</p>
      <span class="bottom-right">© 2026 fields social.</span>
    </div>

  </div>

  <script>
    // ── Supabase config ──
    const SUPABASE_URL = 'https://mezubizlevjcbormljvp.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_S7BZSlUsk_nQ0OY01WVilA_YT5bJoMh'

    const { createClient } = supabase
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // ── Signup handler ──
    async function handleSignup() {
      clearErrors()

      const firstName = document.getElementById('firstName').value.trim()
      const lastName  = document.getElementById('lastName').value.trim()
      const email     = document.getElementById('email').value.trim().toLowerCase()
      const password  = document.getElementById('password').value

      // Validation
      let hasError = false

      if (!firstName) {
        showFieldError('firstNameError', 'firstName')
        hasError = true
      }
      if (!lastName) {
        showFieldError('lastNameError', 'lastName')
        hasError = true
      }
      if (!email.endsWith('@umich.edu')) {
        showFieldError('emailError', 'email')
        hasError = true
      }
      if (password.length < 8) {
        showFieldError('passwordError', 'password')
        hasError = true
      }

      if (hasError) return

      // Disable button
      const btn = document.getElementById('submitBtn')
      btn.disabled = true
      btn.textContent = 'creating account...'

      // Sign up with Supabase
      const { data, error } = await client.auth.signUp({
        email,
        password,
        options: {
          data: {
            first_name: firstName,
            last_name: lastName,
            full_name: `${firstName} ${lastName}`
          }
        }
      })

      if (error) {
        btn.disabled = false
        btn.textContent = 'Create account →'
        showToast(error.message.toLowerCase())
        return
      }

      // Success — redirect to onboarding
      showToast('welcome to fields. ✦')
      setTimeout(() => {
        window.location.href = 'onboarding.html'
      }, 1500)
    }

    function showFieldError(errorId, inputId) {
      document.getElementById(errorId).classList.add('show')
      document.getElementById(inputId).classList.add('error')
    }

    function clearErrors() {
      document.querySelectorAll('.field-error').forEach(e => e.classList.remove('show'))
      document.querySelectorAll('.field-input').forEach(e => e.classList.remove('error'))
    }

    // Allow enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSignup()
    })

    // ── Toast ──
    function showToast(msg) {
      const toast = document.getElementById('toast')
      toast.textContent = msg
      toast.classList.add('show')
      setTimeout(() => toast.classList.remove('show'), 3000)
    }

    // ── Cursor ──
    const cursor = document.getElementById('cursor')
    const ring   = document.getElementById('cursorRing')
    let mx = 0, my = 0, rx = 0, ry = 0

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY
      cursor.style.left = mx + 'px'
      cursor.style.top  = my + 'px'
    })

    ;(function tick() {
      rx += (mx - rx) * 0.1
      ry += (my - ry) * 0.1
      ring.style.left = rx + 'px'
      ring.style.top  = ry + 'px'
      requestAnimationFrame(tick)
    })()

    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursor.style.transform = 'translate(-50%,-50%) scale(2.5)'
        ring.style.opacity = '0.3'
      })
      el.addEventListener('mouseleave', () => {
        cursor.style.transform = 'translate(-50%,-50%) scale(1)'
        ring.style.opacity = '1'
      })
    })
  </script>

</body>
</html>
