<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fields social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  body {
}  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --grey: #ABABAB;
      --white: #FFFFFF;
      --dim:   rgba(255,255,255,0.45);
      --dimmer:rgba(255,255,255,0.25);
    }

    html, body {
      height: 100%;
      background: var(--grey);
      color: var(--white);
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: none;
      overflow-x: hidden;
    }

    /* ── Cursor ── */
    .cursor {
      position: fixed;
      width: 7px; height: 7px;
      background: var(--white);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.12s ease;
    }

    .cursor-ring {
      position: fixed;
      width: 28px; height: 28px;
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: opacity 0.3s ease;
    }

    /* ── Layout ── */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px 48px;
    }

    /* ── Top bar ── */
    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.1s forwards;
    }

    .top-logo {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--white);
      text-decoration: none;
    }

    .top-right {
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--dim);
      text-align: right;
      line-height: 1.6;
    }

    /* ── Hero text ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding-bottom: 60px;
    }

    .hero-title {
      font-size: clamp(4.5rem, 13vw, 13rem);
      font-weight: 800;
      line-height: 0.92;
      letter-spacing: -0.03em;
      color: var(--white);
      opacity: 0;
      animation: fadeUp 1s ease 0.3s forwards;
    }

    /* ── Form area ── */
    .form-area {
      opacity: 0;
      animation: fadeUp 0.9s ease 0.6s forwards;
      margin-top: 56px;
    }

    .form-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 16px;
      display: block;
    }

    .form-row {
      display: flex;
      align-items: stretch;
      gap: 0;
      max-width: 480px;
      border-bottom: 1px solid rgba(255,255,255,0.35);
      padding-bottom: 2px;
    }

    .form-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1rem;
      font-weight: 300;
      color: var(--white);
      letter-spacing: 0.02em;
      padding: 10px 0;
    }

    .form-input::placeholder {
      color: var(--dimmer);
    }

    .form-btn {
      background: transparent;
      border: none;
      outline: none;
      cursor: none;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--white);
      padding: 10px 0 10px 20px;
      transition: opacity 0.25s ease;
    }

    .form-btn:hover { opacity: 0.6; }

    .form-success {
      display: none;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--dim);
      margin-top: 16px;
    }

    /* ── Bottom bar ── */
    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-top: 48px;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.9s forwards;
    }

    .bottom-tagline {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--dim);
      max-width: 280px;
      line-height: 1.7;
    }

    .bottom-right {
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dimmer);
      text-align: right;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .page { padding: 28px 28px; }
      .hero-title { font-size: clamp(4rem, 16vw, 7rem); }
      .form-row { max-width: 100%; }
      .bottom { flex-direction: column; gap: 16px; align-items: flex-start; }
      .bottom-right { text-align: left; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <div class="page">

    <!-- Top -->
    <div class="top">
      <a href="/" class="top-logo">fields social.</a>
      <div class="top-right">
        august 2026.
      </div>
    </div>

    <!-- Hero + Form -->
    <div class="hero">
      <h1 class="hero-title">fields<br/>social.</h1>

      <div class="form-area">
        <span class="form-label">Join the waitlist</span>
        <div class="form-row">
          <input
            class="form-input"
            id="emailInput"
            type="email"
            placeholder="your email"
            autocomplete="off"
          />
          <button class="form-btn" id="submitBtn" onclick="handleSubmit()">
            Notify me →
          </button>
        </div>
        <p class="form-success" id="successMsg">
          you're on the list. see you in august. ✦
        </p>
      </div>
    </div>

    <!-- Bottom -->
    <div class="bottom">
      <p class="bottom-tagline">
        you'll want to be here.
      </p>
      <div class="bottom-right">
        © 2026 fields social.
      </div>
    </div>

  </div>

  <script>
    // Cursor
    const cursor = document.getElementById('cursor');
    const ring   = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top  = my + 'px';
    });

    (function tick() {
      rx += (mx - rx) * 0.1;
      ry += (my - ry) * 0.1;
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';
      requestAnimationFrame(tick);
    })();

    document.querySelectorAll('a, button, input').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursor.style.transform = 'translate(-50%,-50%) scale(2)';
        ring.style.opacity = '0.4';
      });
      el.addEventListener('mouseleave', () => {
        cursor.style.transform = 'translate(-50%,-50%) scale(1)';
        ring.style.opacity = '1';
      });
    });

    // Waitlist submit
    function handleSubmit() {
      const email = document.getElementById('emailInput').value;
      const success = document.getElementById('successMsg');
      const btn = document.getElementById('submitBtn');

      if (!email || !email.includes('@')) {
        document.getElementById('emailInput').style.color = 'rgba(255,255,255,0.5)';
        setTimeout(() => {
          document.getElementById('emailInput').style.color = '#FFFFFF';
        }, 600);
        return;
      }

      // Hide form row, show success
      document.querySelector('.form-row').style.opacity = '0';
      document.querySelector('.form-row').style.transition = 'opacity 0.4s ease';
      setTimeout(() => {
        document.querySelector('.form-row').style.display = 'none';
        success.style.display = 'block';
      }, 400);

      // Here you'd send to your backend / email service
      console.log('Waitlist signup:', email);
    }

    // Allow enter key
    document.getElementById('emailInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSubmit();
    });
  </script>
</body>
</html>
