<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fields social</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;800&display=swap" rel="stylesheet" />
  <style>
    :root { --grey: #121212; --white: #FFFFFF; --dim: rgba(255,255,255,0.45); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      height: 100%; background: var(--grey); color: var(--white); 
      font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .page { 
      height: 100vh; display: flex; flex-direction: column; 
      justify-content: space-between; padding: 40px; 
    }
    .hero-title { 
      font-size: clamp(4rem, 12vw, 12rem); font-weight: 800; 
      line-height: 0.9; letter-spacing: -0.04em; 
    }
    /* Adding this to make sure it "pops" */
    .hero-title { opacity: 0; animation: fadeIn 1s forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="page">
    <div class="top">fields social.</div>
    <div class="hero">
      <h1 class="hero-title">fields<br/>social.</h1>
    </div>
    <div class="bottom">© 2026</div>
  </div>
</body>
</html>
