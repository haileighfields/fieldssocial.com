<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fields social.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,300&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gray:    #ABABAB;
      --white:   #FFFFFF;
      --dim:     rgba(255,255,255,0.5);
      --dimmer:  rgba(255,255,255,0.25);
      --border:  rgba(255,255,255,0.2);
    }

    html, body {
      height: 100%;
      background: var(--gray);
      color: var(--white);
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: none;
      overflow: hidden;
    }

    /* ── Cursor ── */
    .cursor {
      position: fixed;
      width: 7px; height: 7px;
      background: var(--white);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.12s ease;
    }

    .cursor-ring {
      position: fixed;
      width: 28px; height: 28px;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: opacity 0.3s ease;
    }

    /* ── Page Layout ── */
    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px 48px;
    }

    /* ── Top bar ── */
    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.1s forwards;
    }

    .top-right {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      color: var(--dim);
    }

    .top-logo {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--white);
      text-decoration: none;
    }

    /* ── Center content ── */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      max-width: 420px;
    }

    .hero-title {
      font-size: clamp(4rem, 10vw, 8rem);
      font-weight: 800;
      line-height: 0.92;
      letter-spacing: -0.03em;
      color: var(--white);
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.3s forwards;
    }

    .hero-quote {
      font-size: 0.88rem;
      font-weight: 300;
      font-style: italic;
      color: var(--dim);
      letter-spacing: 0.02em;
      margin-bottom: 56px;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.45s forwards;
    }

    /* ── Buttons ── */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 320px;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.6s forwards;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 24px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--white);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: none;
      transition: background 0.25s ease, border-color 0.25s ease;
    }

    .btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.4);
    }

    .btn-google {
      gap: 12px;
    }

    .google-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .btn-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 320px;
    }

    .btn-divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-divider span {
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dimmer);
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      padding: 12px 24px;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--white);
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Bottom ── */
    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.9s forwards;
    }

    .bottom-tagline {
      font-size: 0.72rem;
      font-weight: 300;
      font-style: italic;
      color: var(--dim);
      letter-spacing: 0.02em;
    }

    .bottom-right {
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dimmer);
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .page { padding: 28px; overflow-y: auto; }
      body { overflow: auto; }
      html { height: auto; }
      .btn-group { max-width: 100%; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>
  <div class="toast" id="toast"></div>

  <div class="page">

    <!-- Top -->
    <div class="top">
      <a href="/" class="top-logo">fields social.</a>
      <span class="top-right">august 2026.</span>
    </div>

    <!-- Center -->
    <div class="center">
      <h1 class="hero-title">fields<br/>social.</h1>
      

      <div class="btn-group">

        <!-- Google Sign In -->
        <button class="btn btn-google" onclick="signInWithGoogle()">
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path fill="#ffffff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="rgba(255,255,255,0.7)" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="rgba(255,255,255,0.5)" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="rgba(255,255,255,0.9)" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>

        <!-- Divider -->
        <div class="btn-divider">
          <div class="btn-divider-line"></div>
          <span>or</span>
          <div class="btn-divider-line"></div>
        </div>

        <!-- Sign Up -->
        <a href="signup.html" class="btn">
          Create account
        </a>

        <!-- Log In -->
        <a href="login.html" class="btn">
          Log in
        </a>

      </div>
    </div>

    <!-- Bottom -->
    <div class="bottom">
      <p class="bottom-tagline">you'll want to be here.</p>
      <span class="bottom-right">© 2026 fields social.</span>
    </div>

  </div>

  <script>
    // ── Supabase config ──
    // Replace these two values with your own from Supabase Settings → API
    const SUPABASE_URL = 'https://mezubizlevjcbormljvp.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_S7BZSlUsk_nQ0OY01WVilA_YT5bJoMh'

    const { createClient } = supabase
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // ── Google Sign In ──
    async function signInWithGoogle() {
      const { error } = await client.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin + '/home.html'
        }
      })
      if (error) showToast('something went wrong. try again.')
    }

    // ── Toast ──
    function showToast(msg) {
      const toast = document.getElementById('toast')
      toast.textContent = msg
      toast.classList.add('show')
      setTimeout(() => toast.classList.remove('show'), 3000)
    }

    // ── Check if already logged in ──
    client.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = '/home.html'
    })

    // ── Cursor ──
    const cursor = document.getElementById('cursor')
    const ring   = document.getElementById('cursorRing')
    let mx = 0, my = 0, rx = 0, ry = 0

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY
      cursor.style.left = mx + 'px'
      cursor.style.top  = my + 'px'
    })

    ;(function tick() {
      rx += (mx - rx) * 0.1
      ry += (my - ry) * 0.1
      ring.style.left = rx + 'px'
      ring.style.top  = ry + 'px'
      requestAnimationFrame(tick)
    })()

    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursor.style.transform = 'translate(-50%,-50%) scale(2.5)'
        ring.style.opacity = '0.3'
      })
      el.addEventListener('mouseleave', () => {
        cursor.style.transform = 'translate(-50%,-50%) scale(1)'
        ring.style.opacity = '1'
      })
    })
  </script>

</body>
</html>
